<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes 1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="interview-section">

    <div class="content-layout">

        <div class="content-row header-row">
            <div class="content-header">Mira</div>
            <div class="content-header">Phuong</div>
        </div>

        <div class="content-row">
            <article class="article">
                <p>You wanted to mention something.</p>
            </article>
            <article class="article empty"></article>
        </div>

        <div class="content-row">
            <article class="article">
                <p>Oh, good, that you brought in this perspective. Yeah, you had something in your mind.</p>
            </article>
            <article class="article empty"></article>
        </div>

        <div class="content-row">
            <article class="article empty"></article>
            <article class="article">
                <p>Yes, I wanted to add something here.</p>
            </article>
        </div>

        <div class="content-row">
            <article class="article">
                <p>That makes sense. I think this is an important point in the conversation.</p>
            </article>
            <article class="article empty"></article>
        </div>

        <div class="content-row">
            <article class="article empty"></article>
            <article class="article">
                <p>Exactly. It connects to what we talked about before.</p>
            </article>
        </div>

    </div>

</section>

<script>
const articles = document.querySelectorAll(".article:not(.empty)");

const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            entry.target.classList.add("visible");
        }
    });
}, {
    threshold: 0.2
});

articles.forEach(article => {
    observer.observe(article);
});
</script>

</body>
</html>
